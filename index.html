<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 — Scores &amp; Highlights</title>
  <meta name="description" content="Live World Cup 2026 scores, fixtures and match highlights." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #1a1a1e;
      --surface: #212126;
      --hairline: #2e2e36;
      --hairline-soft: #28282f;
      --text: #d4d4d8;
      --muted: #a1a1aa;
      --subtle: #6b6b74;
      --accent: #a3e635;
      --red: #f87171;
      --amber: #fbbf24;
      --badge-cam: #f472b6;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      line-height: 1.4;
      min-height: 100vh;
    }
    .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }
    .page-foot {
      margin-top: 18px;
      text-align: center;
      font-size: 10.5px;
      color: var(--subtle);
      letter-spacing: 0.3px;
    }
    .page-foot a { color: var(--muted); text-decoration: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const WORKER_URL = "https://wc2026-data.pitchside.workers.dev/";

    function Panel({ children, style = {}, pad = 14 }) {
      return (
        <div style={{
          background: 'var(--surface)',
          border: '1px solid var(--hairline-soft)',
          borderRadius: 10,
          padding: pad,
          minWidth: 0, maxWidth: '100%',
          ...style,
        }}>{children}</div>
      );
    }

    function Spinner({ size = 14 }) {
      return (
        <span style={{
          display: 'inline-block', width: size, height: size,
          border: '2px solid var(--hairline)', borderTopColor: 'var(--muted)',
          borderRadius: '50%', animation: 'spin .8s linear infinite',
          verticalAlign: 'middle',
        }} />
      );
    }

    function SectionHeader({ badge, badgeColor = 'var(--accent)', label, right }) {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '0 0 10px 0', minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
            <div style={{
              width: 18, height: 18, borderRadius: 999,
              background: `color-mix(in oklab, ${badgeColor} 22%, transparent)`,
              color: badgeColor, display: 'grid', placeItems: 'center',
              fontFamily: '"JetBrains Mono", monospace',
              fontSize: 8.5, fontWeight: 700, letterSpacing: 0.3, flexShrink: 0,
            }}>{badge}</div>
            <span className="mono" style={{
              fontSize: 14, letterSpacing: 1.4, fontWeight: 600,
              color: 'var(--muted)', textTransform: 'uppercase',
            }}>{label}</span>
          </div>
          {right && <div style={{ marginLeft: 'auto' }}>{right}</div>}
        </div>
      );
    }

    function WorldCupWidget({ data, loading }) {
      const [revealed, setRevealed] = useState({});
      const fmtTime = (iso) => new Date(iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const fmtDay = (iso) => new Date(iso).toLocaleDateString('en-GB', { weekday: 'short' });
      const isEvening = (iso) => { const h = new Date(iso).getHours(); return h >= 18 && h < 23; };
      const empty = !data || (data.recent.length === 0 && data.upcoming.length === 0);

      return (
        <Panel pad={0}>
          <div style={{ padding: '14px 14px 0 14px' }}>
            <SectionHeader badge="WC" badgeColor="var(--badge-cam)" label="World Cup 2026" right={
              <div style={{ display: 'flex', gap: 6 }}>
                <a href={(data && data.tableUrl) || 'https://www.bbc.co.uk/sport/football/world-cup/table'} target="_blank" rel="noreferrer" title="Standings"
                  style={{ color: 'var(--muted)', textDecoration: 'none', border: '1px solid var(--hairline-soft)', borderRadius: 999, padding: '3px 7px', display: 'flex', alignItems: 'center' }}>
                  <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="2" width="14" height="2.2" rx=".8" fill="currentColor" opacity=".55"/>
                    <rect x="1" y="6.2" width="14" height="2.2" rx=".8" fill="currentColor" opacity=".75"/>
                    <rect x="1" y="10.4" width="14" height="2.2" rx=".8" fill="currentColor"/>
                    <rect x="1" y="2" width="2.2" height="10.6" rx=".8" fill="currentColor" opacity=".4"/>
                  </svg>
                </a>
                <a href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/scores-fixtures?country=GB&wtw-filter=ALL" target="_blank" rel="noreferrer" title="Fixtures &amp; TV"
                  style={{ color: 'var(--muted)', textDecoration: 'none', border: '1px solid var(--hairline-soft)', borderRadius: 999, padding: '3px 7px', display: 'flex', alignItems: 'center' }}>
                  <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="3.5" width="14" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.4"/>
                    <line x1="4.5" y1="13.5" x2="11.5" y2="13.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                    <line x1="8" y1="12.5" x2="8" y2="13.5" stroke="currentColor" strokeWidth="1.4"/>
                    <path d="M6 10.5L9.5 8 6 5.5v5z" fill="currentColor" opacity=".7"/>
                  </svg>
                </a>
              </div>
            } />
          </div>
          {loading ? (
            <div style={{ padding: 24, display: 'flex', justifyContent: 'center' }}><Spinner /></div>
          ) : empty ? (
            <div style={{ padding: '12px 16px 16px', fontSize: 12, color: 'var(--subtle)' }}>No matches in the last / next 24h</div>
          ) : (
            <React.Fragment>
              {data.recent.length > 0 && (
                <div style={{ padding: '4px 16px 12px' }}>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--subtle)', letterSpacing: 1.2, marginBottom: 8, textTransform: 'uppercase' }}>Recent Results</div>
                  {data.recent.map((g, i) => {
                    const open = !!revealed[g.id];
                    return (
                      <button key={g.id} onClick={() => setRevealed(r => ({ ...r, [g.id]: !r[g.id] }))} style={{
                        all: 'unset', cursor: 'pointer',
                        display: 'grid', gridTemplateColumns: '1fr auto 18px auto auto',
                        alignItems: 'center', gap: 8, width: '100%',
                        padding: '6px 0', fontSize: 12,
                        borderTop: i === 0 ? 'none' : '1px dashed var(--hairline-soft)',
                        whiteSpace: 'nowrap',
                      }}>
                        <div style={{ fontSize: 12.5, overflow: 'hidden', textOverflow: 'ellipsis' }}>{`${g.homeFlag ? g.homeFlag + ' ' : ''}${g.home} v ${g.awayFlag ? g.awayFlag + ' ' : ''}${g.away}`}</div>
                        <div className="mono" style={{
                          fontSize: 11, fontWeight: open ? 600 : 400,
                          color: open ? 'var(--accent)' : 'var(--subtle)',
                        }}>
                          {open ? `${g.homeScore}–${g.awayScore}` : 'show'}
                        </div>
                        <div style={{ textAlign: 'right' }}>
                          {g.highlightUrl && (
                            <a href={g.highlightUrl} target="_blank" rel="noreferrer"
                              onClick={e => e.stopPropagation()}
                              title="ITV Highlights"
                              style={{ color: 'var(--red)', fontSize: 13, textDecoration: 'none', opacity: 0.85 }}>▶</a>
                          )}
                        </div>
                        <div className="mono" style={{ color: 'var(--muted)', fontSize: 10.5 }}>{fmtDay(g.date)}</div>
                        <div className="mono" style={{ color: 'var(--muted)', fontSize: 10.5 }}>{fmtTime(g.date)}</div>
                      </button>
                    );
                  })}
                </div>
              )}
              {data.upcoming.length > 0 && (
                <div style={{ borderTop: '1px solid var(--hairline-soft)', padding: '12px 16px 14px' }}>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--subtle)', letterSpacing: 1.2, marginBottom: 8, textTransform: 'uppercase' }}>Upcoming</div>
                  {data.upcoming.map(g => (
                    <div key={g.id} style={{
                      display: 'grid', gridTemplateColumns: '1fr auto auto',
                      alignItems: 'center', gap: 8, padding: '5px 0', fontSize: 12.5, whiteSpace: 'nowrap',
                    }}>
                      <div style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>{`${g.homeFlag ? g.homeFlag + ' ' : ''}${g.home} v ${g.awayFlag ? g.awayFlag + ' ' : ''}${g.away}`}</div>
                      <div className="mono" style={{ color: 'var(--muted)', fontSize: 10.5 }}>{fmtDay(g.date)}</div>
                      <div className="mono" style={{ color: 'var(--muted)', fontSize: 10.5, display: 'flex', alignItems: 'center', gap: 5 }}>
                        {g.live ? (
                          <React.Fragment>
                            <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--red)', flexShrink: 0 }} />
                            <span style={{ color: 'var(--red)', fontWeight: 600 }}>LIVE</span>
                          </React.Fragment>
                        ) : (
                          <React.Fragment>
                            {isEvening(g.date) && <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--amber)', flexShrink: 0 }} />}
                            {fmtTime(g.date)}
                          </React.Fragment>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </React.Fragment>
          )}
        </Panel>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      const load = async () => {
        try {
          const r = await fetch(WORKER_URL);
          if (r.ok) setData(await r.json());
        } catch (_) { /* keep last data */ }
        setLoading(false);
      };

      useEffect(() => {
        load();
        const id = setInterval(load, 5 * 60 * 1000); // refresh every 5 min
        return () => clearInterval(id);
      }, []);

      return (
        <div className="wrap">
          <WorldCupWidget data={data} loading={loading} />
          <div className="page-foot">
            Scores via ESPN · Highlights via <a href="https://www.youtube.com/@ITVSport" target="_blank" rel="noreferrer">ITV Sport</a> · all times local
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
